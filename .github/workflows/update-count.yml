name: Update Problem Count

on:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Calculate file count and Update README
        run: |
          # 한글 폴더명을 인식할 수 있도록 정확히 적어줍니다.
          # 각 폴더 안의 파일 개수를 합산합니다.
          COUNT=$(find "백준" "SWEA" "정올" -type f 2>/dev/null | wc -l)
          echo "Total files: $COUNT"

          # README.md 업데이트 (공백에 민감하지 않게 정규표현식 수정)
          sed -i "s/.*총 풀이 수.*/- **총 풀이 수**: $COUNT/g" README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: 문제 풀이 개수 업데이트 ($COUNT)" && git push)